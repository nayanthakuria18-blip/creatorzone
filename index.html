<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doraemon Road Runner | Kids Special</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: #1e293b; overflow: hidden; user-select: none; touch-action: none; }
        
        #gameGui { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 10; }
        .score-box { background: rgba(255,255,255,0.95); padding: 8px 15px; border-radius: 20px; font-size: 16px; font-weight: bold; color: #0284c7; border: 2px solid #38bdf8; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        #gameCanvas { display: block; background: #87CEEB; margin: 0 auto; box-shadow: 0 10px 35px rgba(0,0,0,0.5); }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.75); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; color: white; padding: 20px; }
        .btn { background: #0ea5e9; color: white; border: none; padding: 15px 40px; font-size: 22px; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 15px; box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4); }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="gameGui">
        <div class="score-box">😋 Doracakes: <span id="cakeCount">0</span></div>
        <div class="score-box">⭐ Score: <span id="gameScore">0</span></div>
    </div>

    <div id="startScreen" class="overlay">
        <h1 style="font-size: 32px; color: #38bdf8; text-shadow: 2px 2px #000; margin-bottom: 10px; text-align: center;">🛣️ Doraemon Road Runner! 🛣️</h1>
        <p style="font-size: 16px; text-align: center; max-width: 300px; color: #cbd5e1;">Tap anywhere to Jump over obstacles on the road and collect Doracakes!</p>
        <button class="btn" onclick="startGame()">START RUN 🚀</button>
    </div>

    <div id="gameOverScreen" class="overlay" style="display: none;">
        <h1 style="font-size: 36px; color: #ef4444; text-shadow: 2px 2px #000;">CRASH! 😭</h1>
        <p style="font-size: 20px; margin-top: 10px; color: #cbd5e1;">Total Score: <span id="finalScore">0</span></p>
        <button class="btn" onclick="startGame()">Run Again 🔄</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth > 500 ? 500 : window.innerWidth;
        canvas.height = window.innerHeight;

        let gameRunning = false;
        let score = 0;
        let doracakes = 0;
        let gameSpeed = 5;
        let obstacles = [];
        let items = [];
        let frame = 0;
        let roadLineOffset = 0;
        let bgOffset = 0;
        let animationFrameId;

        // Dimensions for Sky, Buildings, and Road
        const skyHeight = canvas.height * 0.4;
        const cityHeight = canvas.height * 0.25;
        const roadY = skyHeight + cityHeight;
        const roadHeight = canvas.height - roadY;

        const doraemon = {
            x: 60,
            y: roadY - 60,
            width: 45,
            height: 55,
            gravity: 0.6,
            velocity: 0,
            jumpForce: -13,
            isJumping: false,
            
            draw() {
                ctx.save();
                // Cute Canvas Doraemon Shape
                ctx.fillStyle = "#0284c7"; // Blue Body
                ctx.beginPath();
                ctx.arc(this.x + 22, this.y + 25, 22, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "#ffffff"; // White Face
                ctx.beginPath();
                ctx.arc(this.x + 25, this.y + 27, 15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "#ef4444"; // Red Nose
                ctx.beginPath();
                ctx.arc(this.x + 35, this.y + 22, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#000"; // Eyes
                ctx.fillRect(this.x + 28, this.y + 12, 2, 5);
                ctx.fillRect(this.x + 36, this.y + 12, 2, 5);
                ctx.restore();
            },
            
            jump() {
                if (!this.isJumping) {
                    this.velocity = this.jumpForce;
                    this.isJumping = true;
                }
            },
