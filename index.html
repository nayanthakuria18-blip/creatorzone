 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Fun Learning Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: #ffeb3b; text-align: center; padding: 20px; }
        h1 { color: #e91e63; font-size: 28px; margin-bottom: 10px; text-shadow: 2px 2px #fff; }
        .score-box { font-size: 18px; color: #3f51b5; font-weight: bold; margin-bottom: 20px; }
        
        /* Game Screen */
        .game-container { background: #fff; border-radius: 20px; padding: 20px; max-width: 500px; margin: 0 auto; box-shadow: 0 8px 16px rgba(0,0,0,0.2); border: 5px solid #4caf50; }
        .question-box { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #333; }
        .color-target { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 20px auto; border: 4px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        
        /* Options Buttons */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .option-btn { background-color: #2196f3; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 4px #0b7dda; }
        .option-btn:active { box-shadow: none; transform: translateY(4px); }
        
        /* Message popup */
        #message { font-size: 20px; font-weight: bold; margin-top: 15px; min-height: 30px; }
        .correct { color: #4caf50; }
        .wrong { color: #f44336; }
    </style>
</head>
<body>

    <h1>🎈 Kids Learning Zone 🎈</h1>
    <div class="score-box">Score: <span id="score">0</span></div>

    <div class="game-container">
        <div class="question-box" id="instruction">Identify the Color!</div>
        <div class="color-target" id="colorDisplay"></div>
        
        <div class="options-grid" id="optionsContainer">
            <!-- Buttons will come here automatically -->
        </div>
        
        <div id="message"></div>
    </div>

    <script>
        let score = 0;
        let colors = ["Red", "Blue", "Green", "Yellow", "Orange", "Purple"];
        let hexColors = { "Red": "#f44336", "Blue": "#2196f3", "Green": "#4caf50", "Yellow": "#ffeb3b", "Orange": "#ff9800", "Purple": "#9c27b0" };
        let currentTarget = "";

        function startGame() {
            document.getElementById("message").innerText = "";
            // Select a random color
            let randomIndex = Math.floor(Math.random() * colors.length);
            currentTarget = colors[randomIndex];
            
            // Display the color circle
            document.getElementById("colorDisplay").style.backgroundColor = hexColors[currentTarget];
            
            // Clear old buttons
            let container = document.getElementById("optionsContainer");
            container.innerHTML = "";
            
            // Create shuffled buttons
            let shuffledOptions = [...colors].sort(() => 0.5 - Math.random());
            shuffledOptions.forEach(color => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = color;
                btn.onclick = () => checkAnswer(color);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedColor) {
            let msgBox = document.getElementById("message");
            if(selectedColor === currentTarget) {
                score += 10;
                document.getElementById("score").innerText = score;
                msgBox.className = "correct";
                msgBox.innerText = "🎉 Superb! Correct Answer!";
                setTimeout(startGame, 1500); // Next question after 1.5 sec
            } else {
                msgBox.className = "wrong";
                msgBox.innerText = "❌ Try Again, Buddy!";
            }
        }

        // Start the game for the first time
        startGame();
    </script>

</body>
</html>
