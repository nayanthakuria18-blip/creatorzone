<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorZone Mega Kids Game | 150 Missions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: linear-gradient(135deg, #111827, #1f2937); color: white; text-align: center; padding: 15px; min-height: 100vh; }
        
        /* Top Status Bar */
        .status-bar { display: flex; justify-content: space-around; background: #111827; padding: 12px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #38bdf8; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2); }
        .stat-item { font-size: 16px; font-weight: bold; color: #f3f4f6; }
        .stat-item span { color: #38bdf8; font-size: 18px; }

        /* Game Box */
        .game-card { background: #1f2937; border-radius: 24px; padding: 25px; max-width: 500px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #374151; }
        h2 { color: #38bdf8; font-size: 22px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .display-box { min-height: 120px; display: flex; align-items: center; justify-content: center; font-size: 55px; margin-bottom: 25px; background: #0b0f19; border-radius: 16px; border: 2px dashed #4b5563; padding: 10px; }
        
        /* Options Grid */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-btn { background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #030712; border: none; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); transition: all 0.1s; }
        .game-btn:active { transform: translateY(3px); box-shadow: none; }
        
        /* Messages */
        #feedback { font-size: 18px; font-weight: bold; margin-top: 20px; min-height: 25px; }
        .correct { color: #10b981; animation: pop 0.3s ease; }
        .wrong { color: #ef4444; animation: shake 0.3s ease; }

        /* Download Section */
        .download-box { display: none; background: #065f46; padding: 20px; border-radius: 16px; margin-top: 20px; border: 2px solid #10b981; }
        .download-link { display: inline-block; background: #10b981; color: white; padding: 12px 25px; border-radius: 10px; font-weight: bold; text-decoration: none; margin-top: 10px; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.4); }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1 style="color: #38bdf8; margin-bottom: 15px; font-size: 26px;">🚀 CreatorZone Mission Control 🚀</h1>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="stat-item">Mission: <span id="lblMission">1</span>/150</div>
        <div class="stat-item">Coins: 🪙 <span id="lblCoins">0</span></div>
        <div class="stat-item">Trophies: 🏆 <span id="lblTrophies">0</span></div>
    </div>

    <!-- Main Game Area -->
    <div class="game-card">
        <h2 id="missionName">Mission 1: Color Match</h2>
        <div class="display-box" id="gameDisplay">🔴</div>
        
        <div class="options-grid" id="gameOptions">
            <!-- Buttons dynamically generated -->
        </div>
        
        <div id="feedback"></div>

        <!-- Hidden Download Box (Unlocks at Mission 151) -->
        <div class="download-box" id="downloadSection">
            <h3>🎉 ALL MISSIONS CLEARED! 🎉</h3>
            <p>You are a Super Champion! Download your Next Mega Game Reward now!</p>
            <!-- Bhai yahan niche href="UR_LINK" mein apna doosra game link daal dena -->
            <a href="https://nayanthakuria18-blip.github.io/creatorzone/index.html" class="download-link" target="_blank">Download Next Game 📲</a>
        </div>
    </div>

    <script>
        let coins = 0;
        let trophies = 0;
        let currentMission = 1;
        let correctAnswer = "";

        // Game Database Generators
        const colors = ["Red", "Blue", "Green", "Yellow", "Orange", "Purple"];
        const colorEmojis = { "Red":"🔴", "Blue":"🔵", "Green":"🟢", "Yellow":"🟡", "Orange":"🟠", "Purple":"🟣" };
        
        const animals = ["Elephant", "Lion", "Monkey", "Panda", "Fox", "Frog"];
        const animalEmojis = { "Elephant":"🐘", "Lion":"🦁", "Monkey":"🐵", "Panda":"🐼", "Fox":"🦊", "Frog":"🐸" };

        function loadMission() {
            document.getElementById("feedback").innerText = "";
            let optionsContainer = document.getElementById("gameOptions");
            optionsContainer.innerHTML = "";

            if (currentMission > 150) {
                // Game Over - Reward Screen
                document.getElementById("missionName").innerText = "Victory!";
                document.getElementById("gameDisplay").innerHTML = "👑";
                document.getElementById("downloadSection").style.display = "block";
                return;
            }

            document.getElementById("lblMission").innerText = currentMission;

            // TYPE 1: COLOR MISSIONS (1 to 50)
            if (currentMission <= 50) {
                document.getElementById("missionName").innerText = `Mission ${currentMission}: Color Match`;
                let randomColor = colors[Math.floor(Math.random() * colors.length)];
                document.getElementById("gameDisplay").innerHTML = colorEmojis[randomColor];
                correctAnswer = randomColor;

                makeButtons(colors);
            } 
            // TYPE 2: ANIMAL MISSIONS (51 to 100)
            else if (currentMission <= 100) {
                document.getElementById("missionName").innerText = `Mission ${currentMission}: Animal Name`;
                let randomAnimal = animals[Math.floor(Math.random() * animals.length)];
                document.getElementById("gameDisplay").innerHTML = animalEmojis[randomAnimal];
                correctAnswer = randomAnimal;

                makeButtons(animals);
            } 
            // TYPE 3: MATH MISSIONS (101 to 150)
            else if (currentMission <= 150) {
                document.getElementById("missionName").innerText = `Mission ${currentMission}: Quick Math`;
                let num1 = Math.floor(Math.random() * 10) + 1;
                let num2 = Math.floor(Math.random() * 10) + 1;
                document.getElementById("gameDisplay").innerHTML = `<span style="font-size:36px; color:#fff;">${num1} + ${num2} = ?</span>`;
                correctAnswer = (num1 + num2).toString();

                let mathOptions = [correctAnswer, (num1+num2+2).toString(), (num1+num2-1).toString(), (num1+Math.floor(Math.random()*5)).toString()];
                // Remove duplicates if any
                mathOptions = [...new Set(mathOptions)].slice(0, 4);
                makeButtons(mathOptions);
            }
        }

        function makeButtons(arrayOptions) {
            let optionsContainer = document.getElementById("gameOptions");
            // Shuffle answers
            let shuffled = [...arrayOptions].sort(() => 0.5 - Math.random()).slice(0, 4);
            if(!shuffled.includes(correctAnswer)) { shuffled[0] = correctAnswer; }
            shuffled.sort(() => 0.5 - Math.random());

            shuffled.forEach(opt => {
                let btn = document.createElement("button");
                btn.className = "game-btn";
                btn.innerText = opt;
                btn.onclick = () => verifyAnswer(opt);
                optionsContainer.appendChild(btn);
            });
        }

        function verifyAnswer(selected) {
            let feedback = document.getElementById("feedback");
            if (selected === correctAnswer) {
                coins += 50;
                if (currentMission % 5 === 0) { trophies += 1; } // 1 Trophy every 5 missions
                currentMission++;
                
                document.getElementById("lblCoins").innerText = coins;
                document.getElementById("lblTrophies").innerText = trophies;
                
                feedback.className = "correct";
                feedback.innerText = "🎉 AMAZING! +50 Coins Added!";
                
                setTimeout(loadMission, 1200);
            } else {
                feedback.className = "wrong";
                feedback.innerText = "❌ Uh Oh! Try Again, Hero!";
            }
        }

        // Initialize First Mission
        loadMission();
    </script>
</body>
</html>
